<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVER - Profile View</title>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Teko:wght@600&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'MultiCraft';
            src: url('fonts/MultiCraftFont.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'MultiCraft', monospace;
            background: #000000 url('mver-bg.png') center/cover no-repeat fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* HEADER NAV OVERLAY */
        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0,0,0,0.85);
            box-sizing: border-box;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .nav-logo-side { display: flex; align-items: center; gap: 10px; }
        .nav-logo-side img { height: 24px; }
        .nav-logo-side span { font-size: 20px; letter-spacing: 1px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a {
            color: #b2bec3;
            text-decoration: none;
            font-size: 14px;
            font-family: sans-serif;
            font-weight: 600;
        }
        .nav-links a:hover { color: white; }

        /* MAIN CARD WRAPPER */
        .profile-card-frame {
            background: #000000;
            width: 90%;
            max-width: 780px;
            border: 3px solid #3498db;
            border-radius: 6px;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            margin-top: 60px;
            box-shadow: 0 0 25px rgba(52, 152, 219, 0.2);
        }

        /* SMART CLOSE LINK LINKED TO ACTIONS */
        .close-view {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 32px;
            font-family: sans-serif;
            cursor: pointer;
            line-height: 1;
        }
        .close-view:hover { color: white; }

        .profile-main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .profile-titles h2 {
            font-size: 64px;
            margin: 0;
            line-height: 1;
            letter-spacing: 1px;
            font-weight: normal;
        }

        .profile-titles p {
            font-family: 'Teko', sans-serif;
            font-size: 32px;
            color: #55efc4;
            margin: 5px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Custom style class for waitlist text variant */
        .profile-titles p.status-waitlist {
            color: #fff200;
        }

        /* SQUARE BIG TIER BADGE */
        .square-badge {
            font-size: 72px;
            width: 110px;
            height: 110px;
            border: 4px solid #3498db;
            color: #3498db;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .horizontal-line {
            border: none;
            height: 4px;
            background: #2c3e50;
            margin-bottom: 40px;
        }

        /* OVAL PILL BADGES */
        .stats-grid-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 140px;
        }

        .stat-column-label {
            font-size: 11px;
            font-family: sans-serif;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .oval-pill {
            display: flex;
            align-items: center;
            background: #0d0d0d;
            border-radius: 40px;
            padding: 4px;
            border: 2px solid #7f8c8d;
            width: 100%;
            max-width: 150px;
            box-sizing: border-box;
        }

        .oval-circle-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }

        .oval-letter {
            font-size: 26px;
            margin-left: auto;
            margin-right: 18px;
            font-weight: bold;
        }

        /* Unified Palette Rules */
        .t-P, .t-O, .t-S, .t-A { border-color: #55efc4; color: #55efc4; }
        .t-B { border-color: #fff200; color: #fff200; }
        .t-C { border-color: #ff9f43; color: #ff9f43; }
        .t-D { border-color: #ff7f50; color: #ff7f50; }
        .t-E, .t-F { border-color: #ff4757; color: #ff4757; }
        .t-none { border-color: #7f8c8d; color: #7f8c8d; }

        .i-kf { border-color: #ff4757; }
        .i-ct { border-color: #fff200; }
        .i-ve { border-color: #fff200; }
        .i-te { border-color: #fff200; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-logo-side">
            <img src="mver-logo.png" alt="MVER Logo">
            <span>MVER</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Leaderboard / Home Page</a>
            <a href="index.html?page=tiers">[Tiers]</a>
            <a href="index.html?page=editors">[Editors]</a>
            <a href="index.html?page=submit">[Submit Edits]</a>
            <a href="index.html?page=credits">[Credits]</a>
        </div>
    </div>

    <div class="profile-card-frame" id="profile-card-output"></div>

    <script>
        // Data entries are stored cleanly in lowercase keys to fix the lookup bug
        const editorsData = {
            "confuxion": { rank: "#1", mainTier: "A",  kf: "A",  ct: "A-", ve: "B+", te: "B"  },
            "sxmple":    { rank: "#2", mainTier: "B+", kf: "D",  ct: "B+", ve: "B+", te: "C+" },
            "timmyloal": { rank: "#3", mainTier: "B+", kf: "B",  ct: "B+", ve: "B",  te: "B-" },
            "game1k":    { rank: "#4", mainTier: "B+", kf: "C+", ct: "B+", ve: "B",  te: "B"  },
            "vorthexis": { rank: "#5", mainTier: "B",  kf: "E",  ct: "B",  ve: "B",  te: "B+" },
            "normal":    { rank: "#6", mainTier: "B-", kf: "C",  ct: "C+", ve: "B-", te: "B-" },
            "x9jm":      { rank: "#7", mainTier: "C+", kf: "D",  ct: "C+", ve: "C",  te: "C+" },
            "possessed_yt":  { rank: "#8", mainTier: "C+", kf: "C",  ct: "C",  ve: "D+", te: "C+" },
            "blade":     { rank: "#9", mainTier: "C+", kf: "C-", ct: "C+", ve: "C",  te: "D"  },
            
            "husky_multicraft": { rank: "", mainTier: "D", kf: "-", ct: "-", ve: "-", te: "-" },
            "system1117":       { rank: "", mainTier: "-", kf: "-", ct: "-", ve: "-", te: "-" },
            "aston":            { rank: "", mainTier: "-", kf: "-", ct: "C", ve: "-", te: "-" },
            "itzfroco":         { rank: "", mainTier: "D", kf: "C-", ct: "D", ve: "D+", te: "D" },
            "chillpotato":      { rank: "", mainTier: "-", kf: "-", ct: "-", ve: "-", te: "-" },
            
            "???":   { rank: "#10", mainTier: "?",  kf: "-",  ct: "-",  ve: "-",  te: "-"  }
        };

        const nameMapping = {
            "confuxion": "confuxion", "sxmple": "sxmple", "timmyloal": "TimmyLoal",
            "game1k": "Game1K", "vorthexis": "Vorthexis", "normal": "Normal",
            "x9jm": "x9jm", "blade": "Blade", "possessed_yt": "Possessed_YT",
            "husky_multicraft": "Husky_MultiCraft", "system1117": "system1117",
            "aston": "Aston", "itzfroco": "ItzFroco", "chillpotato": "ChillPotato"
        };

        function getThemeClass(grade) {
            if(!grade || grade === "-") return "t-none";
            const topChar = grade.charAt(0).toUpperCase();
            if(["P","O","S","A","B","C","D","E","F"].includes(topChar)) return "t-" + topChar;
            return "t-none";
        }

        function handleProfileExit() {
            if (document.referrer.includes('index.html')) {
                window.history.back();
            } else {
                window.location.href = "index.html";
            }
        }

        const params = new URLSearchParams(window.location.search);
        let userQuery = params.get('user');
        let userKey = userQuery ? userQuery.toLowerCase() : "unknown";

        if (!editorsData[userKey]) {
            userKey = "unknown"; 
        }

        const user = editorsData[userKey];
        let displayName = userKey === "unknown" ? "???" : (nameMapping[userKey] || userQuery);
        
        let subtitleText = "Official Editor";
        let titleClass = "";
        
        if (user.rank) {
            subtitleText = `Rank ${user.rank} Editor`;
        } else if (user.mainTier === "-") {
            subtitleText = "Waitlist (Pending Evaluation)";
            titleClass = 'class="status-waitlist"';
        }

        const targetContainer = document.getElementById("profile-card-output");
        
        targetContainer.innerHTML = `
            <div class="close-view" onclick="handleProfileExit()">&times;</div>
            <div class="profile-main-header">
                <div class="profile-titles">
                    <h2>${displayName}</h2>
                    <p ${titleClass}>${subtitleText}</p>
                </div>
                <div class="square-badge ${getThemeClass(user.mainTier)}">${user.mainTier}</div>
            </div>
            
            <hr class="horizontal-line">

            <div class="stats-grid-row">
                <div class="stat-column">
                    <span class="stat-column-label">Keyframes</span>
                    <div class="oval-pill ${getThemeClass(user.kf)}">
                        <div class="oval-circle-icon i-kf">&diamond;</div>
                        <span class="oval-letter">${user.kf}</span>
                    </div>
                </div>
                <div class="stat-column">
                    <span class="stat-column-label">Cuts and Transitions</span>
                    <div class="oval-pill ${getThemeClass(user.ct)}">
                        <div class="oval-circle-icon i-ct">&#9874;</div>
                        <span class="oval-letter">${user.ct}</span>
                    </div>
                </div>
                <div class="stat-column">
                    <span class="stat-column-label">Visual Effects</span>
                    <div class="oval-pill ${getThemeClass(user.ve)}">
                        <div class="oval-circle-icon i-ve">&#10022;</div>
                        <span class="oval-letter">${user.ve}</span>
                    </div>
                </div>
                <div class="stat-column">
                    <span class="stat-column-label">Text Effects</span>
                    <div class="oval-pill ${getThemeClass(user.te)}">
                        <div class="oval-circle-icon i-te">Aa</div>
                        <span class="oval-letter">${user.te}</span>
                    </div>
                </div>
            </div>
        `;
    </script>
</body>
</html>
