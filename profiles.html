<!DOCTYPE html>
<html>
<head>
<title>MVER Profile</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:url('mver-bg.png');
    background-size:cover;
    background-attachment:fixed;
    color:white;
}

.profile-card{
    max-width:1200px;
    margin:60px auto;
    background:#000;
    border:4px solid #38bdf8;
    border-radius:15px;
    padding:40px;
    box-shadow:0 0 25px rgba(56,189,248,.5);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.name{
    font-size:90px;
    font-weight:bold;
}

.profile-text{
    color:#2dd4bf;
    font-size:55px;
    font-weight:bold;
}

.rank-box{
    width:180px;
    height:180px;
    border:4px solid gold;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:120px;
    font-weight:bold;
    color:gold;
    box-shadow:0 0 25px gold;
}

.line{
    height:5px;
    background:#222;
    margin:30px 0;
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.stat{
    background:#111;
    border:2px solid gold;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.stat h3{
    margin-bottom:15px;
}

.grade{
    font-size:55px;
    font-weight:bold;
    color:gold;
}

.back{
    margin-top:30px;
    display:inline-block;
    padding:12px 20px;
    background:#38bdf8;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="profile-card">

<div class="top">
<div>
<div class="name" id="name">Loading...</div>
<div class="profile-text">PROFILE</div>
</div>

<div class="rank-box" id="overallRank">B</div>
</div>

<div class="line"></div>

<div class="stats">

<div class="stat">
<h3>Keyframes</h3>
<div class="grade" id="keyframes">B</div>
</div>

<div class="stat">
<h3>Cuts & Transitions</h3>
<div class="grade" id="cuts">B</div>
</div>

<div class="stat">
<h3>Visual Effects</h3>
<div class="grade" id="visuals">B</div>
</div>

<div class="stat">
<h3>Text Effects</h3>
<div class="grade" id="text">B</div>
</div>

</div>

<a class="back" href="editors.html">← Back to Editors</a>

</div>

<script>

const profiles = {

Vorthexis:{
rank:"B",
keyframes:"E",
cuts:"B",
visuals:"B",
text:"B+"
},

Game1K:{
rank:"B+",
keyframes:"C+",
cuts:"B+",
visuals:"B-",
text:"A-"
},

TimmyLoal:{
rank:"B+",
keyframes:"C+",
cuts:"B+",
visuals:"B",
text:"A-"
},

confuxion:{
rank:"A-",
keyframes:"A",
cuts:"A",
visuals:"A-",
text:"B+"
}

};

const params = new URLSearchParams(window.location.search);
const user = params.get("user");

if(profiles[user]){
document.getElementById("name").textContent = user;
document.getElementById("overallRank").textContent = profiles[user].rank;
document.getElementById("keyframes").textContent = profiles[user].keyframes;
document.getElementById("cuts").textContent = profiles[user].cuts;
document.getElementById("visuals").textContent = profiles[user].visuals;
document.getElementById("text").textContent = profiles[user].text;
}

</script>

</body>
</html>
