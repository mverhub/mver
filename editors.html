.card{

}

.card h2{
    margin-bottom:15px;
}

.btn{

    color:white;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    display:inline-block;
}

.btn:hover{
    opacity:.8;
}

.home{
    text-align:center;
    margin:40px;
}

</style>
</head>
