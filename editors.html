<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVER - Editors Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'MultiCraft';
            src: url('fonts/MultiCraftFont.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }
        body {
            margin: 0; padding: 40px 20px;
            font-family: 'MultiCraft', monospace;
            background: #000000; color: white;
            display: flex; flex-direction: column; align-items: center;
        }
        .back-home {
            color: #3498db; text-decoration: none; font-size: 16px;
            font-family: sans-serif; font-weight: bold; margin-bottom: 30px;
            border: 2px solid #3498db; padding: 8px 16px; border-radius: 4px;
        }
        .back-home:hover { background: #3498db; color: black; }
        
        .main-container { width: 100%; max-width: 750px; }
        h1 { text-align: center; font-size: 42px; margin-bottom: 40px; letter-spacing: 1px; }

        .tier-shelf {
            background: #0a0a0a; border: 2px solid #333;
            border-radius: 6px; padding: 20px; margin-bottom: 20px;
        }
        .shelf-title {
            font-size: 28px; color: #55efc4; margin: 0 0 15px 0;
            border-bottom: 2px solid #111; padding-bottom: 5px;
        }
        .sub-row {
            display: flex; align-items: center; gap: 20px;
            padding: 10px 0; border-bottom: 1px solid #111;
        }
        .badge {
            font-size: 18px; font-weight: bold; width: 50px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px; color: black; border: 1px solid #000;
        }
        .desc { font-family: sans-serif; font-size: 14px; color: #888; }

        /* Tier Division Colors */
        .p-div { background: #dcdde1; }
        .o-div { background: #ffeaa7; }
        .s-div { background: #74b9ff; }
        .a-div { background: #55efc4; }
        .b-div { background: #ffeaa7; }
        .c-div { background: #ffcaa7; }
        .d-div { background: #ff7675; }
        .e-div { background: #a29bfe; }
        .f-div { background: #2d3436; color: white; }
    </style>
</head>
<body>

    <a href="index.html?page=editors" class="back-home">&larr; Return to main site</a>
    
    <div class="main-container">
        <h1>EDITORS RANK MATRIX</h1>
        <div id="matrix-root"></div>
    </div>

    <script>
        const divisions = [
            { name: "PRODIGY DIVISION (P)", prefix: "P", class: "p-div" },
            { name: "OVERLORD DIVISION (O)", prefix: "O", class: "o-div" },
            { name: "SUPREME DIVISION (S)", prefix: "S", class: "s-div" },
            { name: "ALPHA DIVISION (A)", prefix: "A", class: "a-div" },
            { name: "BETA DIVISION (B)", prefix: "B", class: "b-div" },
            { name: "COMPETENT DIVISION (C)", prefix: "C", class: "c-div" },
            { name: "DEVELOPING DIVISION (D)", prefix: "D", class: "d-div" },
            { name: "ENTRY DIVISION (E)", prefix: "E", class: "e-div" },
            { name: "FOUNDATION DIVISION (F)", prefix: "F", class: "f-div" }
        ];

        const container = document.getElementById("matrix-root");
        divisions.forEach(div => {
            let html = `
                <div class="tier-shelf">
                    <h3 class="shelf-title">${div.name}</h3>
                    <div class="sub-row">
                        <div class="badge ${div.class}">${div.prefix}+</div>
                        <span class="desc">High tier variants operating in the upper bracket spectrum.</span>
                    </div>
                    <div class="sub-row">
                        <div class="badge ${div.class}">${div.prefix}</div>
                        <span class="desc">Standard baseline requirements for the ${div.prefix} classification.</span>
                    </div>
                    <div class="sub-row">
                        <div class="badge ${div.class}">${div.prefix}-</div>
                        <span class="desc">Low tier variants stabilizing their placement metrics.</span>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });
    </script>
</body>
</html>
