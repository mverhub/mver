<!DOCTYPE html>

<title>MVER - Editors Leaderboard</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1220;
    color:white;
}

/* HEADER BAR */
.header{
    background:url('mver-bg.png') center/cover no-repeat;
    height:200px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    font-weight:bold;
    letter-spacing:4px;
    border-bottom:3px solid #38bdf8;
}

/* TITLE */
.title{
    text-align:center;
    margin:25px 0;
    font-size:28px;
    letter-spacing:2px;
}

/* CENTER WRAPPER */
.leaderboard{
    width:650px;
    margin:auto;
}

/* CARD STYLE (MATCH MVER) */
.card{
    background:#0c1a3a;
    border:2px solid #1f4fff;
    border-radius:12px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:12px 14px;
    margin:10px 0;
}

/* LEFT SIDE */
.left{
    display:flex;
    align-items:center;
    gap:12px;
}

/* RANK BOX */
.rank{
    background:#1f4fff;
    padding:6px 10px;
    border-radius:6px;
    font-weight:bold;
}

/* NAME */
.name{
    font-weight:bold;
}

/* RIGHT SIDE */
.right{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:12px;
}

/* PROFILE BUTTON */
.profile{
    background:#1e293b;
    border:none;
    color:white;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.profile:hover{
    background:#334155;
}

/* TIER BOXES */
.tier{
    padding:6px 10px;
    border-radius:6px;
    font-weight:bold;
    min-width:35px;
    text-align:center;
}

/* COLORS (MATCH SCREENSHOT STYLE) */
.Aminus{background:#7CFF4D;color:black;}
.Bplus{background:#FFD84D;color:black;}
.B{background:#FFB000;color:black;}
.Bminus{background:#FF9A3D;color:black;}
.Cplus{background:#FF7A00;color:black;}
.C{background:#FF4D00;color:white;}
</style>

</head>
