<script src="data.js"></script>

    <script>
        function switchView(viewId) {
            sessionStorage.setItem('mver_active_tab', viewId);
            document.querySelectorAll('.view-content').forEach(view => view.classList.remove('active-view'));
            document.querySelectorAll('.nav-menu a').forEach(link => link.classList.remove('active-tab'));

            const selectedView = document.getElementById('view-' + viewId);
            if(selectedView) selectedView.classList.add('active-view');

            const selectedLink = document.getElementById('link-' + viewId);
            if(selectedLink) selectedLink.classList.add('active-tab');
            
            window.scrollTo(0, 0);
        }

        // assignments and nameMapping are now safely loaded from data.js!

        const divisions = [
            { name: "PRODIGY DIVISION (P)", prefix: "P", class: "p-div" },
            { name: "OVERLORD DIVISION (O)", prefix: "O", class: "o-div" },
            { name: "SUPREME DIVISION (S)", prefix: "S", class: "s-div" },
            { name: "ALPHA DIVISION (A)", prefix: "A", class: "a-div" },
            { name: "BETA DIVISION (B)", prefix: "B", class: "b-div" },
            { name: "COMPETENT DIVISION (C)", prefix: "C", class: "c-div" },
            { name: "DEVELOPING DIVISION (D)", prefix: "D", class: "d-div" },
            { name: "ENTRY DIVISION (E)", prefix: "E", class: "e-div" },
            { name: "FOUNDATION DIVISION (F)", prefix: "F", class: "f-div" }
        ];

        const container = document.getElementById("matrix-root");
        
        divisions.forEach(div => {
            let shelfHTML = `
                <div class="tier-shelf">
                    <h3 class="shelf-title">${div.name}</h3>
            `;
            
            ["+", "", "-"].forEach(suffix => {
                const fullTierKey = div.prefix + suffix;
                const members = assignments[fullTierKey] || [];
                
                let listContent = "";
                if (members.length === 0) {
                    listContent = `<span class="empty-slot">-</span>`;
                } else {
                    members.forEach(m => {
                        const labelName = nameMapping[m.toLowerCase()] || m;
                        listContent += `<a href="profiles.html?user=${m}" class="editor-item-link">${labelName}</a>`;
                    });
                }

                shelfHTML += `
                    <div class="sub-row">
                        <div class="badge ${div.class}">${fullTierKey}</div>
                        <div class="editors-list">${listContent}</div>
                    </div>
                `;
            });

            shelfHTML += `</div>`;
            container.insertAdjacentHTML('beforeend', shelfHTML);
        });

        if(assignments["WAITLIST"] && assignments["WAITLIST"].length > 0) {
            let waitlistHTML = `
                <div class="tier-shelf" style="border-color: #fff200;">
                    <h3 class="shelf-title" style="color: #fff200; border-bottom-color: #574b14;">MVER OFFICIAL WAITLIST</h3>
                    <div class="sub-row">
                        <div class="badge w-div">WAIT</div>
                        <div class="editors-list">
            `;
            
            assignments["WAITLIST"].forEach(m => {
                const labelName = nameMapping[m.toLowerCase()] || m;
                waitlistHTML += `<a href="profiles.html?user=${m}" class="editor-item-link" style="border-color:#fff200; background:rgba(255,242,0,0.08);">${labelName}</a>`;
            });

            waitlistHTML += `
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', waitlistHTML);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const pageParam = urlParams.get('page');
        const storedTab = sessionStorage.getItem('mver_active_tab');

        if(pageParam) {
            switchView(pageParam);
        } else if (storedTab) {
            switchView(storedTab);
        } else {
            switchView('home');
        }
    </script>
