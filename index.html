<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVER - Editors Leaderboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Teko:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'MultiCraft', monospace;
            /* Matches the hazy sky background from the screenshot */
            background: url('mver-bg.png') center/cover no-repeat fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER SECTION */
        .header-section {
            width: 100%;
            background: rgba(0, 0, 0, 0.4); /* Dark tinted overlay for the top header image area */
            text-align: center;
            padding: 40px 0 20px 0;
            border-bottom: 4px solid #55efc4; /* Mint green separator line */
        }

        .header-title {
            font-family: 'MultiCraft', monospace;
            font-size: 80px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1;
        }

        .header-subtitle {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 5px;
            color: #dcdde1;
        }

        /* WELCOME BANNER (BLACK SECTION) */
        .welcome-banner {
            width: 100%;
            background: #000000;
            padding: 30px 0;
            text-align: center;
            box-sizing: border-box;
        }

        .welcome-content {
            max-width: 600px;
            margin: 0 auto;
            font-size: 13px;
            color: #b2bec3;
            line-height: 1.6;
        }

        .welcome-content h3 {
            color: white;
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        /* TIERS BUTTON */
        .tiers-btn {
            background: #2f3640;
            border: 2px solid #7f8c8d;
            color: #f5f6fa;
            padding: 6px 24px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }

        /* MAIN LEADERBOARD CONTAINER */
        .leaderboard-container {
            width: 100%;
            max-width: 480px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .main-title {
            font-family: 'MultiCraft', monospace;
            font-size: 36px;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #222; /* Dark text over the light sky background */
            text-shadow: 1px 1px 0px #fff;
        }

        /* CARD DESIGN */
        .
