<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVER - MultiCraft Visual Editing Rankings</title>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Teko:wght@600&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'MultiCraft';
            src: url('fonts/MultiCraftFont.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'MultiCraft', monospace;
            background: #000000 url('mver-bg.png') center/cover no-repeat fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* NAVIGATION HEADER */
        .top-navbar {
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .nav-branding {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .nav-branding img { height: 28px; }
        .nav-branding span { font-size: 22px; font-weight: bold; }
        
        .nav-menu { display: flex; gap: 20px; }
        .nav-menu a {
            color: #b2bec3;
            text-decoration: none;
            font-size: 13px;
            font-family: sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-menu a:hover, .nav-menu a.active-tab { color: #55efc4; }

        /* HERO MAIN HEADER */
        .header-section {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            text-align: center;
            padding: 40px 0 20px 0;
            border-bottom: 4px solid #3498db;
        }
        .header-title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .header-logo { height: 64px; }
        .header-title { font-size: 80px; text-transform: uppercase; margin: 0; line-height: 1; }
        .header-subtitle { font-size: 11px; font-weight: bold; margin-top: 5px; color: #dcdde1; }

        /* VIEW CONTAINERS */
        .view-content { display: none; width: 100%; max-width: 800px; margin: 40px auto; padding: 0 20px; box-sizing: border-box; }
        .view-content.active-view { display: block; }

        .welcome-content { max-width: 600px; margin: 0 auto; font-size: 13px; color: #b2bec3; line-height: 1.6; }
