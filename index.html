<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVER - Main Matrix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Teko:wght@600&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'MultiCraft';
            src: url('fonts/MultiCraftFont.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'MultiCraft', monospace;
            background: #000000 url('mver-bg.png') center/cover no-repeat fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* HEADER NAV OVERLAY */
        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0,0,0,0.85);
            box-sizing: border-box;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            z-index: 10;
        }
        .nav-logo-side { display: flex; align-items: center; gap: 10px; }
        .nav-logo-side img { height: 24px; }
        .nav-logo-side span { font-size: 20px; letter-spacing: 1px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a {
            color: #b2bec3;
            text-decoration: none;
            font-size: 14px;
            font-family: sans-serif;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-links a:hover, .nav-links a.active-tab { color: white; }

        /* VIEW CONTAINER SYSTEM */
        .view-content {
            display: none;
            width: 90%;
            max-width: 1000px;
            margin-top: 100px;
            margin-bottom: 40px;
            box-sizing: border-box;
        }
        .active-view { display: block; }

        /* MATRIX TIERS SPECIFIC STYLING */
        .matrix-title {
            text-align: center;
            font-size: 48px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .tier-shelf {
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid #3498db;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.1);
        }

        .shelf-title {
            margin: 0 0 15px 0;
            font-size: 24px;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 8px;
            letter-spacing: 1px;
        }

        .sub-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .sub-row:last-child { margin-bottom: 0; }

        .badge {
            width: 65px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 4px;
            border: 2px solid white;
            margin-right: 20px;
            flex-shrink: 0;
        }

        /* Division Color Schemes */
        .p-div, .o-div, .s-div, .a-div { border-color: #55efc4; color: #55efc4; background: rgba(85,239,196,0.05); }
        .b-div { border-color: #fff200; color: #fff200; background: rgba(255,242,0,0.05); }
        .c-div { border-color: #ff9f43; color: #ff9f43; background: rgba(255,159,67,0.05); }
        .d-div { border-color: #ff7f50; color: #ff7f50; background: rgba(255,127,80,0.05); }
        .e-div, .f-div { border-color: #ff4757; color: #ff4757; background: rgba(255,71,87,0.05); }
        .w-div { border-color: #fff200; color: #fff200; background: rgba(255,242,0,0.08); }

        .editors-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .editor-item-link {
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border: 2px solid #7f8c8d;
            border-radius: 4px;
            background: rgba(255,255,255,0.03);
            font-size: 16px;
            transition: all 0.2s ease;
        }
        .editor-item-link:hover {
            border-color: white;
            background: rgba(255,255,255,0.15);
            transform: scale(1.03);
        }

        .empty-slot {
            color: #555;
            font-size: 20px;
            margin-left: 5px;
        }

        /* DIRECTORY LAYOUT ELEMENTS */
        .directory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .directory-card {
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid #7f8c8d;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s ease;
            text-decoration: none;
            color: white;
        }
        .directory-card:hover {
            border-color: #3498db;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        .directory-name { font-size: 24px; margin: 0 0 5px 0; }
        .directory-rank { font-size: 14px; color: #3498db; font-family: sans-serif; font-weight: bold; margin-bottom: 10px; }
        .directory-tier-badge {
            display: inline-block;
            padding: 4px 12px;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid;
            font-size: 14px;
        }

        /* PORTAL IFRAME/FORM DESIGN */
        .portal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .portal-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px 40px;
            font-family: 'MultiCraft', monospace;
            font-size: 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }
        .portal-btn:hover { background: #2980b9; }

        /* DOCUMENTATION LISTS */
        .info-list { margin: 0; padding-left: 20px; line-height: 1.6; font-size: 18px; }
        .info-list li { margin-bottom: 10px; }
        .info-list strong { color: #55efc4; }
